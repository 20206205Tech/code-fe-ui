name: Deploy NextJS to Vercel + Cloudflare DNS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install-deps:
    runs-on: ubuntu-latest
    outputs:
      deps-cache-key: ${{ steps.cache-key.outputs.CACHE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Calculate cache key
        id: cache-key
        run: |
          echo "CACHE_KEY=deps-node-modules-${{ hashFiles('package-lock.json') }}" >> "$GITHUB_OUTPUT"

      - name: Download cached dependencies
        uses: actions/cache@v3
        id: cache
        with:
          path: node_modules
          key: ${{ steps.cache-key.outputs.CACHE_KEY }}
          restore-keys: |
            deps-node-modules-

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

  build:
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Download cached dependencies
        uses: actions/cache@v3
        id: cache
        with:
          path: node_modules
          key: ${{ needs.install-deps.outputs.deps-cache-key }}

      - name: Build Project
        run: npm run build --if-present

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [install-deps, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Download cached dependencies
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ needs.install-deps.outputs.deps-cache-key }}

      - name: Fetch secrets from Doppler
        id: doppler
        uses: dopplerhq/secrets-fetch-action@v1.2.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          doppler-project: ${{ secrets.DOPPLER_PROJECT }}
          doppler-config: ${{ secrets.DOPPLER_CONFIG }}

      - name: Generate Metadata
        id: meta
        run: |
          REPO_NAME_LOW=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g')
          echo "name=$REPO_NAME_LOW" >> $GITHUB_OUTPUT


          echo "full_domain=${{ secrets.DOMAIN }}" >> $GITHUB_OUTPUT

      - name: Initialize Vercel Project
        run: |
          PROJECT_NAME="${{ steps.meta.outputs.name }}"
          npx vercel project add "$PROJECT_NAME" --token=${{ secrets.VERCEL_TOKEN }} --yes || true
          npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Sync Doppler Secrets to Vercel
        env:
          DOPPLER_JSON: ${{ steps.doppler.outputs.json }}
        run: |
          V_CMD="npx vercel --token=${{ secrets.VERCEL_TOKEN }}"

          # Add Main Domain
          $V_CMD domains add ${{ steps.meta.outputs.full_domain }} --force || true

          # Đẩy từng secret từ Doppler vào Vercel Production
          echo "$DOPPLER_JSON" | jq -r 'to_entries[] | .key + " " + (.value | tostring)' | while read -r key value; do
            printf "%s" "$value" | $V_CMD env add "$key" production --force || true
          done

      - name: Deploy to Vercel
        id: vercel_deploy
        run: |
          PARAM="--token=${{ secrets.VERCEL_TOKEN }} --yes --prod"
          DEPLOY_URL=$(npx vercel deploy $PARAM)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Configure Cloudflare DNS (Root Domain)
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          DOMAIN_NAME="${{ steps.meta.outputs.full_domain }}"

          # Tìm Record ID cho domain chính (thường là bản ghi A hoặc CNAME @)
          RECORD_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=$DOMAIN_NAME" \
            -H "Authorization: Bearer $CF_TOKEN" | jq -r '.result[0].id // empty')

          # Cấu hình CNAME trỏ về Vercel (sử dụng @ cho domain chính)
          DNS_PAYLOAD=$(jq -n --arg name "@" --arg content "${{ secrets.VERCEL_CNAME }}" \
            '{type:"CNAME", name:$name, content:$content, ttl:1, proxied:true}')

          if [ -z "$RECORD_ID" ]; then
            METHOD="POST"
            URL="https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records"
          else
            METHOD="PUT"
            URL="https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RECORD_ID"
          fi

          curl -X $METHOD "$URL" -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" -d "$DNS_PAYLOAD"
